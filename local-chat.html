<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promptbanken – Chatta lokalt</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="local-run.css">
</head>
<body>
    <header>
        <h1>💬 Chatta lokalt</h1>
        <p>Ollama-chat med streaming i din lokala miljö</p>
    </header>

    <main class="local-chat-page">
        <p><a href="index.html">← Tillbaka till promptbanken</a></p>

        <section class="local-chat-shell" aria-label="Lokal chatt med Ollama">
            <div class="local-chat-toolbar">
                <label for="local-chat-model-select">Modell</label>
                <select id="local-chat-model-select"></select>
                <button type="button" id="local-chat-reset" class="secondary-btn local-chat-reset-btn">Ny chatt</button>
                <span id="local-chat-status" class="local-chat-state" data-state="idle">Klar</span>
            </div>

            <div id="local-chat-messages" class="local-chat-messages" aria-live="polite"></div>

            <form id="local-chat-form" class="local-chat-input-area">
                <textarea id="local-chat-input" placeholder="Skriv ett meddelande..." rows="3"></textarea>
                <div class="local-chat-actions">
                    <button type="submit" id="local-chat-send" class="primary-btn">Skicka</button>
                    <button type="button" id="local-chat-stop" class="secondary-btn" disabled>Stoppa</button>
                </div>
            </form>
        </section>

        <section class="local-chat-install-info" aria-label="Installationsinformation">
            <p>Vill du köra detta lokalt på din egen dator eller server?<br>
            Installera Community Edition (gratis):<br>
            <a href="https://github.com/BUsavsjo/promptbanken/" target="_blank" rel="noopener noreferrer">https://github.com/BUsavsjo/promptbanken/</a></p>
        </section>
    </main>

    <script src="local-chat.js" defer></script>
</body>
</html>
